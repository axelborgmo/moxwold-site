<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MOXWOLD™</title>
<meta name="description" content="Moxwold AS — independent software studio, Oslo.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anybody:wdth,wght@75..150,100..900&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Noto+Sans+JP:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F2EFE6;            /* bone paper */
    --ink:#121212;           /* soft black */
    --hair:#1212121f;        /* hairline rules */
    --muted:#12121299;       /* secondary mono text */
    --faint:#1212124d;
    --mag:#EC008C;           /* warhol misregistration — magenta */
    --cyan:#00AEEF;          /* warhol misregistration — cyan */
    --pad:clamp(16px,3.2vw,40px);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"Space Mono",ui-monospace,Menlo,monospace;
    overflow:hidden;
    cursor:none;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  /* ---------- frame / crop marks ---------- */
  .frame{position:fixed;inset:0;z-index:5;pointer-events:none;}
  .crop{position:absolute;width:14px;height:14px;}
  .crop::before,.crop::after{content:"";position:absolute;background:var(--ink);}
  .crop::before{width:14px;height:1px;top:0;left:0;}
  .crop::after{width:1px;height:14px;top:0;left:0;}
  .crop.tl{top:var(--pad);left:var(--pad);}
  .crop.tr{top:var(--pad);right:var(--pad);transform:scaleX(-1);}
  .crop.bl{bottom:var(--pad);left:var(--pad);transform:scaleY(-1);}
  .crop.br{bottom:var(--pad);right:var(--pad);transform:scale(-1,-1);}

  /* ---------- corner HUD micro-text ---------- */
  .hud{position:fixed;z-index:6;font-size:10.5px;line-height:1.5;letter-spacing:0.14em;
       text-transform:uppercase;color:var(--muted);pointer-events:none;white-space:nowrap;}
  .hud .reg{color:var(--ink);}
  .tl-hud{top:calc(var(--pad) + 22px);left:calc(var(--pad) + 22px);}
  .tr-hud{top:calc(var(--pad) + 22px);right:calc(var(--pad) + 22px);text-align:right;}
  .bl-hud{bottom:calc(var(--pad) + 22px);left:calc(var(--pad) + 22px);}
  .br-hud{bottom:calc(var(--pad) + 60px);right:calc(var(--pad) + 22px);text-align:right;}
  .target{display:inline-block;width:11px;height:11px;border:1px solid currentColor;border-radius:50%;
          position:relative;vertical-align:-1px;margin-right:6px;}
  .target::before,.target::after{content:"";position:absolute;background:currentColor;}
  .target::before{width:1px;height:11px;left:50%;top:-3px;transform:translateX(-50%);}
  .target::after{height:1px;width:11px;top:50%;left:-3px;transform:translateY(-50%);}

  /* ---------- vertical katakana spine ---------- */
  .spine{position:fixed;top:50%;left:calc(var(--pad) + 2px);transform:translateY(-50%);
         writing-mode:vertical-rl;font-family:"Noto Sans JP",sans-serif;font-size:12px;
         letter-spacing:0.32em;color:var(--faint);z-index:6;pointer-events:none;user-select:none;}

  /* ---------- stage / wordmark ---------- */
  .stage{position:fixed;inset:0;display:grid;place-items:center;z-index:4;}
  .mark-wrap{position:relative;text-align:center;}
  #mark{
    font-family:"Anybody",system-ui,sans-serif;
    font-weight:760;
    font-size:clamp(58px,16.5vw,260px);
    line-height:0.9;
    letter-spacing:-0.01em;
    display:flex;justify-content:center;align-items:center;
    color:var(--ink);
    font-variation-settings:"wght" 760,"wdth" 100;
  }
  #mark .ch{
    display:inline-block;
    position:relative;
    will-change:transform,font-variation-settings,text-shadow;
    font-variation-settings:inherit;
  }
  #mark .tm{
    font-family:"Space Mono",monospace;
    font-size:0.16em;font-weight:400;
    align-self:flex-start;margin-top:0.5em;margin-left:0.1em;
    letter-spacing:0;color:var(--muted);
  }
  .sub{margin-top:1.6em;display:flex;gap:0.9em;justify-content:center;align-items:center;
       font-size:11px;letter-spacing:0.34em;text-transform:uppercase;color:var(--muted);}
  .sub .dot{width:4px;height:4px;background:var(--ink);border-radius:50%;display:inline-block;}
  .kana-sub{font-family:"Noto Sans JP",sans-serif;letter-spacing:0.2em;color:var(--faint);}

  /* ---------- marquee ---------- */
  .marquee{position:fixed;left:0;right:0;bottom:0;z-index:6;
           border-top:1px solid var(--hair);background:var(--bg);
           overflow:hidden;white-space:nowrap;pointer-events:none;}
  .marquee__track{display:inline-flex;will-change:transform;animation:scroll 38s linear infinite;}
  .marquee span{display:inline-block;padding:9px 0;font-size:11px;letter-spacing:0.16em;
                text-transform:uppercase;color:var(--ink);}
  .marquee .sep{color:var(--faint);padding:0 1.6em;}
  @keyframes scroll{to{transform:translateX(-50%);}}

  /* ---------- custom cursor ---------- */
  .cursor{position:fixed;top:0;left:0;width:13px;height:13px;border-radius:50%;
          background:#fff;mix-blend-mode:difference;pointer-events:none;z-index:50;
          transform:translate(-50%,-50%);will-change:transform;}
  .cursor.ring{width:13px;height:13px;}

  /* ---------- film grain ---------- */
  .grain{position:fixed;inset:-50%;width:200%;height:200%;z-index:40;pointer-events:none;
         opacity:0.05;mix-blend-mode:multiply;
         background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.82' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
         will-change:transform;}

  /* ---------- footer legal ---------- */
  .legal{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(var(--pad) - 2px);
         z-index:6;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);
         text-align:center;pointer-events:none;width:100%;padding:0 var(--pad);}

  @media (max-width:640px){
    .tr-hud,.bl-hud{display:none;}
    .spine{display:none;}
    .sub{flex-wrap:wrap;gap:0.5em;}
  }
  @media (prefers-reduced-motion:reduce){
    .marquee__track{animation:none;}
    .grain{display:none;}
  }
</style>
</head>
<body>
  <!-- grain -->
  <div class="grain" id="grain" aria-hidden="true"></div>

  <!-- frame + crop marks -->
  <div class="frame" aria-hidden="true">
    <span class="crop tl"></span><span class="crop tr"></span>
    <span class="crop bl"></span><span class="crop br"></span>
  </div>

  <!-- corner HUD -->
  <div class="hud tl-hud" aria-hidden="true"><span class="target"></span>MOXWOLD&nbsp;STUDIO</div>
  <div class="hud tr-hud" aria-hidden="true">EST.&nbsp;2026<br><span class="reg">VER.&nbsp;1.0</span></div>
  <div class="hud bl-hud" aria-hidden="true">LOT&nbsp;NO. 935&nbsp;872&nbsp;200<br>SOFTWARE / OSLO</div>
  <div class="hud br-hud" id="hud-clock" aria-hidden="true">59.9139°N&nbsp;10.7522°E<br><span class="reg" id="clock">00:00:00</span></div>

  <!-- katakana spine -->
  <div class="spine" aria-hidden="true">モクスウォルド</div>

  <!-- stage -->
  <main class="stage">
    <div class="mark-wrap">
      <h1 id="mark" aria-label="MOXWOLD"><span class="tm" aria-hidden="true">™</span></h1>
      <div class="sub" aria-hidden="true">
        <span>SOFTWARE</span><span class="dot"></span>
        <span class="kana-sub">独立</span><span class="dot"></span>
        <span>OSLO</span>
      </div>
    </div>
  </main>

  <!-- marquee -->
  <div class="marquee" aria-hidden="true">
    <div class="marquee__track" id="track"></div>
  </div>

  <!-- legal / identity (kept for org association) -->
  <div class="legal" aria-hidden="true">MOXWOLD&nbsp;AS — ORG.&nbsp;935&nbsp;872&nbsp;200 — WALDEMAR&nbsp;THRANES&nbsp;GATE&nbsp;72, OSLO — AXEL@MOXWOLD.COM</div>

  <!-- cursor -->
  <div class="cursor" id="cursor" aria-hidden="true"></div>

<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const WORD = "MOXWOLD";

  /* ---- build wordmark letters (insert before the ™) ---- */
  const mark = document.getElementById("mark");
  const tm = mark.querySelector(".tm");
  const letters = [];
  for (const c of WORD){
    const s = document.createElement("span");
    s.className = "ch";
    s.textContent = c;
    mark.insertBefore(s, tm);
    letters.push({ node:s, cx:0, cy:0,
      cur:{w:760,wd:100,x:0,y:0,ab:0}, tar:{w:760,wd:100,x:0,y:0,ab:0} });
  }

  function measure(){
    for (const L of letters){
      const r = L.node.getBoundingClientRect();
      L.cx = r.left + r.width/2;
      L.cy = r.top  + r.height/2;
    }
  }
  // re-measure after fonts settle
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(()=>{ measure(); });
  window.addEventListener("load", measure);
  window.addEventListener("resize", ()=>{ measure(); }, {passive:true});
  setTimeout(measure, 300); setTimeout(measure, 1200);

  /* ---- pointer + velocity ---- */
  let mx=-9999, my=-9999, pmx=0, pmy=0, vel=0;
  let cx=window.innerWidth/2, cy=window.innerHeight/2;     // cursor lerp pos
  let cScale=1;
  let running=false;

  const REST={w:540,wd:100}, PEAK={w:880,wd:138};
  const RADIUS=275, PULL=17, AB_MAX=6;
  const gauss=(d,r)=>Math.exp(-(d*d)/(2*(r*0.46)*(r*0.46)));
  const lerp=(a,b,n)=>a+(b-a)*n;

  function onMove(e){
    mx=e.clientX; my=e.clientY;
    vel=Math.min(80, Math.hypot(mx-pmx,my-pmy));
    pmx=mx; pmy=my;
    if(!running){ running=true; requestAnimationFrame(tick); }
  }
  window.addEventListener("pointermove", onMove, {passive:true});
  window.addEventListener("pointerdown", onMove, {passive:true});

  /* ---- custom cursor ---- */
  const cursor=document.getElementById("cursor");

  /* ---- grain drift ---- */
  const grain=document.getElementById("grain");
  let gx=0, gy=0;

  function tick(){
    // cursor smoothing
    cx=lerp(cx,mx<-9000?window.innerWidth/2:mx,0.18);
    cy=lerp(cy,my<-9000?window.innerHeight/2:my,0.18);

    // is cursor over the wordmark band?
    let nearMark=false;
    for(const L of letters){ if(Math.hypot(mx-L.cx,my-L.cy)<RADIUS*0.7){ nearMark=true; break; } }
    cScale=lerp(cScale, nearMark?3.2:1, 0.12);
    cursor.style.transform=`translate(${cx}px,${cy}px) translate(-50%,-50%) scale(${cScale})`;

    // velocity decay
    vel*=0.9;
    const velN=Math.min(1, vel/55);

    let active=Math.abs(cScale-(nearMark?3.2:1))>0.01 || vel>0.4;

    for(const L of letters){
      const dx=L.cx-mx, dy=L.cy-my;
      const d=Math.hypot(dx,dy);
      const t=d<RADIUS?gauss(d,RADIUS):0;             // 0..1 proximity

      L.tar.w  = lerp(REST.w , PEAK.w , t);
      L.tar.wd = lerp(REST.wd, PEAK.wd, t);
      // magnetic attract toward cursor
      const f=Math.max(0,1-d/RADIUS); const pull=f*f*PULL;
      L.tar.x = -(dx/(d||1))*pull;
      L.tar.y = -(dy/(d||1))*pull*0.7;
      // chromatic aberration grows with proximity + velocity
      L.tar.ab = (t*0.6 + velN*0.9) * AB_MAX;

      L.cur.w  = lerp(L.cur.w , L.tar.w , 0.16);
      L.cur.wd = lerp(L.cur.wd, L.tar.wd, 0.16);
      L.cur.x  = lerp(L.cur.x , L.tar.x , 0.18);
      L.cur.y  = lerp(L.cur.y , L.tar.y , 0.18);
      L.cur.ab = lerp(L.cur.ab, L.tar.ab, 0.2);

      L.node.style.fontVariationSettings=`"wght" ${L.cur.w|0},"wdth" ${L.cur.wd.toFixed(1)}`;
      L.node.style.transform=`translate(${L.cur.x.toFixed(2)}px,${L.cur.y.toFixed(2)}px)`;
      const a=L.cur.ab;
      L.node.style.textShadow = a>0.15
        ? `${a.toFixed(2)}px 0 0 var(--mag), ${(-a).toFixed(2)}px 0 0 var(--cyan)`
        : "none";

      if(Math.abs(L.tar.w-L.cur.w)>0.5 || Math.abs(L.cur.x-L.tar.x)>0.2 || L.cur.ab>0.2) active=true;
    }

    // letter-spacing breathe with velocity
    mark.style.letterSpacing = (-0.01 + velN*0.04).toFixed(4)+"em";

    // grain parallax drift
    if(!REDUCED){
      gx=lerp(gx,(mx/window.innerWidth-0.5)*30,0.05);
      gy=lerp(gy,(my/window.innerHeight-0.5)*30,0.05);
      grain.style.transform=`translate(${gx.toFixed(1)}px,${gy.toFixed(1)}px)`;
    }

    if(active){ requestAnimationFrame(tick); } else { running=false; }
  }
  requestAnimationFrame(tick);

  /* ---- scramble reveal (soulwire pattern, trimmed) ---- */
  const GLYPHS="ﾊﾐﾋｰｳｼﾅﾓﾆｻﾜｲｸ▚▞#%&/<>_=+*◼◻01";
  function scramble(target){
    const nodes=letters.map(L=>L.node);
    const queue=nodes.map((n,i)=>({
      to:target[i], node:n,
      start:Math.floor(Math.random()*16),
      end:Math.floor(Math.random()*16)+18+i*2, char:null
    }));
    let frame=0, raf;
    (function run(){
      let done=0;
      for(const q of queue){
        if(frame>=q.end){ done++; q.node.textContent=q.to; }
        else if(frame>=q.start){
          if(!q.char || Math.random()<0.32) q.char=GLYPHS[Math.floor(Math.random()*GLYPHS.length)];
          q.node.textContent=q.char;
        } else { q.node.textContent=""; }
      }
      if(done<queue.length){ frame++; raf=requestAnimationFrame(run); }
      else { for(let i=0;i<nodes.length;i++) nodes[i].textContent=WORD[i]; }
    })();
  }
  // intro reveal
  if(!REDUCED){ setTimeout(()=>scramble(WORD), 220); }
  // re-scramble when pointer enters the wordmark (debounced)
  let scrTimer=0;
  mark.addEventListener("pointerenter", ()=>{
    const now=Date.now(); if(now-scrTimer<900) return; scrTimer=now;
    if(!REDUCED) scramble(WORD);
  });

  /* ---- live clock ---- */
  const clockEl=document.getElementById("clock");
  function clock(){
    const d=new Date();
    const p=n=>String(n).padStart(2,"0");
    clockEl.textContent=`${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
  }
  clock(); setInterval(clock,1000);

  /* ---- marquee content ---- */
  const track=document.getElementById("track");
  const items=["MOXWOLD™","SOFTWARE STUDIO","OSLO — NORGE","EST. 2026",
               "LOT NO. 935 872 200","59.9139°N 10.7522°E","独立系ソフトウェア","VER. 1.0"];
  const unit=items.map(t=>`<span>${t}</span><span class="sep">＊</span>`).join("");
  track.innerHTML=unit+unit;     // duplicate for seamless -50% loop
})();
</script>
</body>
</html>

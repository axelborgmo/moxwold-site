<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MOXWOLD</title>
<meta name="description" content="Moxwold — independent software studio.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anybody:wdth,wght@75..150,100..900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F2EFE6;
    --ink:#121212;
    --hair:#1212121f;
    --muted:#12121299;
    --faint:#1212124d;
    --mag:#EC008C;
    --cyan:#00AEEF;
    --pad:clamp(14px,3.2vw,40px);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  html{ -webkit-text-size-adjust:100%; }
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"Space Mono",ui-monospace,Menlo,monospace;
    overflow:hidden;
    cursor:none;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    overscroll-behavior:none;
    touch-action:none;
  }
  /* ---------- crop marks ---------- */
  .frame{position:fixed;inset:0;z-index:5;pointer-events:none;}
  .crop{position:absolute;width:13px;height:13px;}
  .crop::before,.crop::after{content:"";position:absolute;background:var(--ink);}
  .crop::before{width:13px;height:1px;top:0;left:0;}
  .crop::after{width:1px;height:13px;top:0;left:0;}
  .crop.tl{top:var(--pad);left:var(--pad);}
  .crop.tr{top:var(--pad);right:var(--pad);transform:scaleX(-1);}
  .crop.bl{bottom:var(--pad);left:var(--pad);transform:scaleY(-1);}
  .crop.br{bottom:var(--pad);right:var(--pad);transform:scale(-1,-1);}

  /* ---------- stage / wordmark ---------- */
  .stage{position:fixed;inset:0;display:grid;place-items:center;z-index:4;padding:0 var(--pad);}
  .mark-wrap{position:relative;text-align:center;}
  #mark{
    font-family:"Anybody",system-ui,sans-serif;
    font-weight:760;
    font-size:clamp(54px,16.5vw,260px);
    line-height:0.9;
    letter-spacing:-0.01em;
    display:flex;justify-content:center;align-items:center;
    color:var(--ink);
    font-variation-settings:"wght" 760,"wdth" 100;
  }
  #mark .ch{
    display:inline-block;position:relative;
    will-change:transform,font-variation-settings,text-shadow;
    font-variation-settings:inherit;
  }
  .sub{margin-top:1.7em;display:flex;flex-wrap:wrap;gap:0.9em;justify-content:center;align-items:center;
       font-size:11px;letter-spacing:0.34em;text-transform:uppercase;color:var(--muted);}
  .sub .dot{width:4px;height:4px;background:var(--ink);border-radius:50%;display:inline-block;}
  .sub a{color:inherit;text-decoration:none;pointer-events:auto;transition:color .25s ease;}
  .sub a:hover{color:var(--ink);}

  /* ---------- custom cursor ---------- */
  .cursor{position:fixed;top:0;left:0;width:13px;height:13px;border-radius:50%;
          background:#fff;mix-blend-mode:difference;pointer-events:none;z-index:50;
          transform:translate(-50%,-50%);will-change:transform;}

  /* ---------- film grain ---------- */
  .grain{position:fixed;inset:-50%;width:200%;height:200%;z-index:40;pointer-events:none;
         opacity:0.05;mix-blend-mode:multiply;
         background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.82' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
         will-change:transform;}

  /* ---------- mobile ---------- */
  @media (max-width:640px){
    #mark{ font-size:clamp(52px,19vw,150px); }
    .sub{ margin-top:1.4em; font-size:9.5px; letter-spacing:0.2em; gap:0.6em; }
  }
  /* touch devices: no hover cursor */
  @media (hover:none){
    .cursor{ display:none; }
  }
  @media (prefers-reduced-motion:reduce){
    .grain{display:none;}
  }
</style>
</head>
<body>
  <div class="grain" id="grain" aria-hidden="true"></div>

  <div class="frame" aria-hidden="true">
    <span class="crop tl"></span><span class="crop tr"></span>
    <span class="crop bl"></span><span class="crop br"></span>
  </div>

  <main class="stage">
    <div class="mark-wrap">
      <h1 id="mark" aria-label="MOXWOLD"></h1>
      <div class="sub">
        <span>SOFTWARE</span><span class="dot"></span>
        <span>OSLO</span><span class="dot"></span>
        <a href="mailto:hello@moxwold.com">hello@moxwold.com</a>
      </div>
    </div>
  </main>

  <div class="cursor" id="cursor" aria-hidden="true"></div>

<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const isTouch = window.matchMedia("(hover:none)").matches;
  const isNarrow = window.matchMedia("(max-width:640px)").matches;
  const WORD = "MOXWOLD";
  const now = ()=> (window.performance && performance.now ? performance.now() : Date.now());

  const mark = document.getElementById("mark");
  const letters = [];
  for (const c of WORD){
    const s = document.createElement("span");
    s.className = "ch";
    s.textContent = c;
    mark.appendChild(s);
    letters.push({ node:s, cx:0, cy:0,
      cur:{w:760,wd:100,x:0,y:0,ab:0}, tar:{w:760,wd:100,x:0,y:0,ab:0} });
  }

  function measure(){
    for (const L of letters){
      const r = L.node.getBoundingClientRect();
      L.cx = r.left + r.width/2;
      L.cy = r.top  + r.height/2;
    }
  }
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(measure);
  window.addEventListener("load", measure);
  window.addEventListener("resize", measure, {passive:true});
  window.addEventListener("orientationchange", ()=>setTimeout(measure,250));
  setTimeout(measure, 300); setTimeout(measure, 1200);

  /* ---- pointer + velocity ---- */
  let mx=-9999, my=-9999, pmx=0, pmy=0, vel=0;
  let cx=window.innerWidth/2, cy=window.innerHeight/2;
  let cScale=1, running=false, lastMove=-9999, ambAmp=0;

  const REST={w:540,wd:100};
  const PEAK = isNarrow ? {w:860,wd:118} : {w:880,wd:138};
  const RADIUS = isNarrow ? 210 : 275;
  const PULL   = isNarrow ? 10  : 17;
  const AB_MAX = 6;
  const gauss=(d,r)=>Math.exp(-(d*d)/(2*(r*0.46)*(r*0.46)));
  const lerp=(a,b,n)=>a+(b-a)*n;

  function onMove(e){
    mx=e.clientX; my=e.clientY;
    vel=Math.min(80, Math.hypot(mx-pmx,my-pmy));
    pmx=mx; pmy=my; lastMove=now();
    if(!running){ running=true; requestAnimationFrame(tick); }
  }
  window.addEventListener("pointermove", onMove, {passive:true});
  window.addEventListener("pointerdown", onMove, {passive:true});
  function release(e){ if(!e || e.pointerType==="touch"){ mx=-9999; my=-9999; } }
  window.addEventListener("pointerup", release, {passive:true});
  window.addEventListener("pointercancel", release, {passive:true});

  const cursor=document.getElementById("cursor");
  const grain=document.getElementById("grain");
  let gx=0, gy=0;

  function tick(){
    const t0 = now();
    cx=lerp(cx,mx<-9000?window.innerWidth/2:mx,0.18);
    cy=lerp(cy,my<-9000?window.innerHeight/2:my,0.18);

    let nearMark=false;
    for(const L of letters){ if(Math.hypot(mx-L.cx,my-L.cy)<RADIUS*0.7){ nearMark=true; break; } }
    cScale=lerp(cScale, nearMark?3.2:1, 0.12);
    cursor.style.transform=`translate(${cx}px,${cy}px) translate(-50%,-50%) scale(${cScale})`;

    vel*=0.9;
    const velN=Math.min(1, vel/55);

    const idle = (t0 - lastMove) > 1400;
    const ambientWant = (isTouch || idle) ? 1 : 0;
    ambAmp = lerp(ambAmp, ambientWant, 0.045);

    let active = ambAmp>0.02 || Math.abs(cScale-(nearMark?3.2:1))>0.01 || vel>0.4;

    for(let i=0;i<letters.length;i++){
      const L=letters[i];
      const dx=L.cx-mx, dy=L.cy-my;
      const d=Math.hypot(dx,dy);
      const t = d<RADIUS ? gauss(d,RADIUS) : 0;
      const aw = (Math.sin(t0*0.0016 + i*0.72)*0.5+0.5) * ambAmp;
      const wf = Math.max(t, aw*0.62);

      L.tar.w  = lerp(REST.w , PEAK.w , wf);
      L.tar.wd = lerp(REST.wd, PEAK.wd, t);              // width: cursor proximity only (stable box when idle)
      const f=Math.max(0,1-d/RADIUS); const pull=f*f*PULL;
      L.tar.x = -(dx/(d||1))*pull;
      L.tar.y = -(dy/(d||1))*pull*0.7;
      L.tar.ab = (t*0.6 + velN*0.9 + aw*0.45) * AB_MAX;

      L.cur.w  = lerp(L.cur.w , L.tar.w , 0.16);
      L.cur.wd = lerp(L.cur.wd, L.tar.wd, 0.16);
      L.cur.x  = lerp(L.cur.x , L.tar.x , 0.18);
      L.cur.y  = lerp(L.cur.y , L.tar.y , 0.18);
      L.cur.ab = lerp(L.cur.ab, L.tar.ab, 0.2);

      L.node.style.fontVariationSettings=`"wght" ${L.cur.w|0},"wdth" ${L.cur.wd.toFixed(1)}`;
      L.node.style.transform=`translate(${L.cur.x.toFixed(2)}px,${L.cur.y.toFixed(2)}px)`;
      const a=L.cur.ab;
      L.node.style.textShadow = a>0.15
        ? `${a.toFixed(2)}px 0 0 var(--mag), ${(-a).toFixed(2)}px 0 0 var(--cyan)`
        : "none";
    }

    mark.style.letterSpacing = (-0.01 + velN*0.04).toFixed(4)+"em";

    if(!REDUCED){
      gx=lerp(gx,(mx<-9000?0:(mx/window.innerWidth-0.5))*30,0.05);
      gy=lerp(gy,(my<-9000?0:(my/window.innerHeight-0.5))*30,0.05);
      grain.style.transform=`translate(${gx.toFixed(1)}px,${gy.toFixed(1)}px)`;
    }

    if(active){ requestAnimationFrame(tick); } else { running=false; }
  }
  requestAnimationFrame(tick);
  setInterval(()=>{ if(!running){ running=true; requestAnimationFrame(tick); } }, 1600);

  /* ---- scramble (latin / symbols only) ---- */
  const GLYPHS="ØÆÅøæåØÆÅøæå{}()[];:<>=+-*/%&|!^~#";
  let scrambling=false;
  function scramble(){
    const nodes=letters.map(L=>L.node);
    const queue=nodes.map((n,i)=>({
      to:WORD[i], node:n,
      start:Math.floor(Math.random()*16),
      end:Math.floor(Math.random()*16)+18+i*2, char:null
    }));
    let frame=0; scrambling=true;
    (function run(){
      let done=0;
      for(const q of queue){
        if(frame>=q.end){ done++; q.node.textContent=q.to; }
        else if(frame>=q.start){
          if(!q.char || Math.random()<0.32) q.char=GLYPHS[Math.floor(Math.random()*GLYPHS.length)];
          q.node.textContent=q.char;
        } else { q.node.textContent=""; }
      }
      if(done<queue.length){ frame++; requestAnimationFrame(run); }
      else { for(let i=0;i<nodes.length;i++) nodes[i].textContent=WORD[i]; scrambling=false; }
    })();
  }
  if(!REDUCED){ setTimeout(scramble, 220); }
  // tap / click the wordmark to re-scramble (works on touch and desktop)
  let scrTimer=0;
  mark.addEventListener("pointerdown", ()=>{
    const n=Date.now(); if(n-scrTimer<700||scrambling) return; scrTimer=n;
    if(!REDUCED) scramble();
  });
})();
</script>
</body>
</html>
